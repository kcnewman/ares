name: Deploy to Cloud Run

on:
  push:
    paths:
      - ".github/workflows/**"
      - "data/raw.csv"
      - "Dockerfile"
      - "entrypoint.sh"
      - "pyproject.toml"
      - "uv.lock"
      - "lib/**"
      - "api/**"
      - "ui/**"
      - "models/**"
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Install Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run lint
        run: uvx ruff check .
      - name: Run tests
        run: uv run --extra dev pytest -q --cov=lib --cov=api --cov=ui

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Setup Cloud Run
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Push
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ares-repo/ares-app:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ares-repo/ares-app:${{ github.sha }}

      - name: Deploy
        run: |
          gcloud run deploy ares-service \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ares-repo/ares-app:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
