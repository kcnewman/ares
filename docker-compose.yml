services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - BACKEND_URL=http://127.0.0.1:8000
      - PORT=8080
    volumes:
      - ./models:/app/models
      - ./data:/app/data
