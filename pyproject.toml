[project]
name = "ares"
version = "0.1.0"
description = "ARES; a system to help estimate likely rent ranges for residential properties based on current online asking prices in the GA region"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "scipy>=1.16.3",
    "seaborn>=0.13.2",
    "statsmodels>=0.14.6",
    "boto3>=1.40.33",
    "category-encoders>=2.8.1",
    "evidently>=0.7.12",
    "fastapi>=0.116.1",
    "great-expectations==1.5.8",
    "lightgbm>=4.6.0",
    "matplotlib>=3.10.5",
    "mlflow>=3.3.1",
    "nbformat>=5.10.4",
    "numpy==1.26.4",
    "optuna>=4.5.0",
    "pandas==2.1.1",
    "polars>=1.32.3",
    "pytest>=8.4.1",
    "scikit-learn>=1.7.1",
    "seaborn>=0.13.2",
    "streamlit>=1.48.1",
    "xgboost==3.0.4",
    "catboost",
    "python-box==6.0.2",
    "pyYAML",
    "tqdm",
    "joblib",
    "types-PyYAML",
    "notebook>=7.5.1",
    "googlemaps>=4.10.0",
    "beartype>=0.22.9",
    "geopandas>=1.1.2",
    "folium>=0.20.0",
]

[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["ares"]
package-dir = {"" = "src"}
