[project]
name = "ares"
version = "0.1.0"
description = "ARES; a system to help estimate likely rent ranges for residential properties based on current online asking prices in the GA region"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "matplotlib>=3.10.8",
    "notebook>=7.5.1",
    "numpy>=2.4.0",
    "pandas>=2.3.3",
    "scipy>=1.16.3",
    "seaborn>=0.13.2",
]
