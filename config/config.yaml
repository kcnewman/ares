artifacts_root: artifacts

data_validation:
  root_dir: artifacts/data_validation
  data_dir: artifacts/data/raw.csv
  status_file: artifacts/data_validation/status.txt

data_split:
  root_dir: artifacts/data_split
  data_dir: artifacts/data/raw.csv
  status_file: artifacts/data_validation/status.txt
  min_listings: 50
  test_size: 0.2
  random_state: 2025

data_processing:
  root_dir: artifacts/data_processing
  data_dir: artifacts/data/raw.csv
  train: artifacts/data_split/train.csv
  test: artifacts/data_split/eval.csv
  geocode_cache: artifacts/cache/geocode_cache.json
  drop_columns:
    - fetch_date
    - property_size
    - locality_grouped
  outlier_iqr_multiplier: 1.5

feature_engineering:
  root_dir: artifacts/feature_engineering
  train: artifacts/data_processing/preprocessed_train.csv
  test: artifacts/data_processing/preprocessed_eval.csv
  schema: artifacts/cache/schema.json
  geocode_cache: artifacts/cache/geocode_cache.json
  k_smoothing: 50
  elite_lux_threshold: 5
  elite_loc_pi_threshold: 0.8
  elite_areas_override: []

model:
  CatBoost:
    learning_rate: 0.06099
    depth: 6
    l2_leaf_reg: 3.0
    subsample: 0.8
    random_strength: 1.0
    min_data_in_leaf: 1
    random_seed: 42
    allow_writing_files: false

model_trainer:
  root_dir: artifacts/model_trainer
  train: artifacts/feature_engineering/features_train.csv
  test: artifacts/feature_engineering/features_test.csv
  model_name: model.joblib

llm_service_url: http://localhost:8001

model_evaluation:
  root_dir: artifacts/model_evaluation
  test: artifacts/feature_engineering/features_test.csv
  model_path: artifacts/model_trainer/model.joblib
  metric_file: artifacts/model_evaluation/metrics.json
